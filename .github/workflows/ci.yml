name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Variables públicas (claves NEXT_PUBLIC_*, seguras de exponer).
# Configúralas en GitHub: Settings → Secrets and variables → Actions → Variables.
# Las claves SECRETAS de Stripe (STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET) y de
# Supabase (SUPABASE_SERVICE_ROLE_KEY) NO se necesitan en CI: el build crea el
# cliente de Stripe de forma perezosa y el E2E no entra en el pago. Cuando haya
# pruebas que cobren de verdad, añádelas como Secrets (nunca como Variables).
env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  NEXT_PUBLIC_TENANT_SLUG: ${{ vars.NEXT_PUBLIC_TENANT_SLUG }}
  NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}

jobs:
  quality:
    name: Lint · Typecheck · Tests · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
